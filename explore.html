<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Explore — CinePath</title>
    <link rel="icon" href="assets/favicon/favicon.svg" type="image/svg+xml" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="stylesheet" href="assets/css/styles.css" />

    <style>
        
        
        body { padding-top: 100px; background-color: #0b0b0c; color: white; }

       
        .toolbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 16px;
        }
        .filter-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            font-size: 14px;
        }
        .filter-btn:hover, .filter-btn.active { background: #e50914; color: white; border-color: #e50914; }
        .tools-group { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .local-search-wrapper { position: relative; }
        .local-search-wrapper svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #666; width: 16px; height: 16px; }
        .local-search-input { background: #000; border: 1px solid #333; padding: 10px 10px 10px 36px; border-radius: 8px; color: white; font-size: 14px; width: 200px; transition: 0.3s; }
        .local-search-input:focus { outline: none; border-color: #e50914; width: 240px; }
        .sort-select { background: #000; border: 1px solid #333; color: white; padding: 10px 15px; border-radius: 8px; font-size: 14px; cursor: pointer; outline: none; }
        
        
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding-bottom: 60px; }
        .movie-card { background: #18181b; border-radius: 16px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .movie-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); z-index: 2; border-color: rgba(255,255,255,0.2); }
        .poster-wrapper { position: relative; aspect-ratio: 2/3; overflow: hidden; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .movie-card:hover .poster-img { transform: scale(1.1); }
        .card-info { padding: 16px; }
        .card-title { font-size: 16px; font-weight: 700; margin: 0 0 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .card-meta { font-size: 12px; color: #888; display: flex; justify-content: space-between; margin-top: 6px; }
        .loc-badge { background: rgba(229, 9, 20, 0.2); color: #ff4d4d; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }

        
        .rating-badge-card {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.8); color: #ffc107;
            padding: 4px 8px; border-radius: 8px;
            font-size: 12px; font-weight: 800;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 193, 7, 0.3);
            z-index: 10;
        }
        .year-meta-card { font-size: 12px; color: #aaa; background: rgba(255, 255, 255, 0.1); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .card-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 4px; }

        
        .fav-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ccc;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .fav-btn:hover {
            transform: scale(1.1);
            background: rgba(0, 0, 0, 0.8);
            color: white;
        }

        .fav-btn.active {
            background: rgba(229, 9, 20, 0.9);
            color: white;
            border-color: #e50914;
        }
        
        .fav-btn svg { width: 18px; height: 18px; fill: currentColor; }

        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid #333; width: 100%; max-width: 1200px; height: 90vh; border-radius: 24px; display: grid; grid-template-columns: 350px 1fr; overflow: hidden; position: relative; animation: modalUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9); }
        
        .modal-image-container { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .modal-poster-bg { position: absolute; inset: -20px; background-size: cover; background-position: center; filter: blur(20px) brightness(0.4); z-index: 1; transition: background-image 0.3s ease; }
        .modal-poster { position: relative; z-index: 2; width: 100%; height: 100%; object-fit: contain; display: block; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        .modal-details { padding: 50px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .modal-header-group { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .title-area h2 { font-size: 42px; margin: 10px 0; line-height: 1.1; letter-spacing: -1px; }
        .meta-badges { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .year-badge { border: 1px solid #444; padding: 4px 10px; border-radius: 6px; font-size: 13px; color: #ccc; font-weight: 600; }
        .type-badge { background: #333; color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 600; text-transform: uppercase; }
        .imdb-box { background: #f5c518; color: #000; padding: 6px 12px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(245, 197, 24, 0.3); min-width: 60px; transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: default; border: 1px solid rgba(0,0,0,0.1); }
        .imdb-box:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245, 197, 24, 0.5); }
        .imdb-score { font-size: 20px; font-weight: 900; line-height: 1; letter-spacing: -0.5px; }
        .imdb-label { font-size: 9px; font-weight: 800; text-transform: uppercase; margin-top: 3px; opacity: 0.85; letter-spacing: 0.5px; }

        .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; transition: 0.2s; z-index: 20; }
        .close-btn:hover { background: #e50914; border-color: #e50914; }

        .location-list { margin-top: 30px; margin-bottom: 20px; }
        .location-item { background: #222; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #333; }
        .loc-header { display: flex; align-items: center; width: 100%; }
        .loc-number { background: #333; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 700; color: #888; flex-shrink: 0; }
        
        #osm-map { width: 100%; height: 400px; border-radius: 12px; margin-top: 20px; display: none; z-index: 1; }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #18181b; color: #fff; border: 1px solid #333; }
        .leaflet-popup-content b { color: #e50914; }
        
        .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
        #spotifyBtn { display: flex; align-items: center; justify-content: center; background: #1DB954; color: white; border: none; padding: 15px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; text-decoration: none; white-space: nowrap; }
        #spotifyBtn:hover { background: #1ed760; transform: translateY(-2px); }
        #startRouteBtn { flex: 1; background: #e50914; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        #startRouteBtn:hover { background: #b20710; }

        
        .rating-container { margin-left: 45px; display: flex; align-items: center; gap: 5px; }
        .rating-label { font-size: 12px; color: #666; margin-right: 5px; }
        .star { font-size: 18px; color: #444; cursor: pointer; transition: color 0.2s; }
        .star:hover, .star.filled { color: #ffc107; }
        .user-only-msg { font-size: 11px; color: #e50914; margin-left: 10px; display: none; }

       
        .play-icon-left { width: 40px; height: 40px; border-radius: 50%; background: rgba(229, 9, 20, 0.15); color: #e50914; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-right: 15px; transition: all 0.2s; border: 1px solid rgba(229, 9, 20, 0.3); flex-shrink: 0; }
        .play-icon-left:hover { background: #e50914; color: white; transform: scale(1.1); box-shadow: 0 0 15px rgba(229, 9, 20, 0.5); }
        .play-icon-left.disabled { background: rgba(255, 255, 255, 0.05); color: #444; border-color: transparent; cursor: default; pointer-events: none; }

      
        .video-modal-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .video-modal-overlay.active { opacity: 1; }
        .video-wrapper { position: relative; width: 90%; max-width: 900px; background: #000; border-radius: 16px; box-shadow: 0 0 50px rgba(229, 9, 20, 0.4); overflow: hidden; border: 1px solid #333; }
        .video-player { width: 100%; height: auto; display: block; max-height: 80vh; }
        .close-video { position: absolute; top: 15px; right: 15px; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.2); color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: 0.2s; }
        .close-video:hover { background: #e50914; border-color: #e50914; }

        @keyframes modalUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @media (max-width: 900px) {
            .modal-content { grid-template-columns: 1fr; height: 95vh; grid-template-rows: 250px 1fr; }
            .modal-actions { flex-direction: column; }
            .toolbar-container { flex-direction: column; align-items: stretch; }
            .tools-group { justify-content: space-between; }
            .local-search-input { width: 100%; }
            .local-search-input:focus { width: 100%; }
        }
    </style>
</head>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { initAuthListener, getUserRatingsForMovie, saveUserRating, getUserData, toggleFavorite } from './auth_manager.js';
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

       import { CONFIG } from './config.js';
         const firebaseConfig = CONFIG.FIREBASE;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allContent = [];
        let mapInstance = null;
        let filterState = { type: 'all', search: '', sort: 'newest' };
        let userFavorites = []; 
        
        async function fetchContent() {
            const loader = document.getElementById('loader');
            try {
                
                const user = auth.currentUser;
                if (user) {
                    const userData = await getUserData(user.uid);
                    if (userData && userData.favorites) userFavorites = userData.favorites;
                }

                const q = query(collection(db, "contents"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                allContent = [];
                querySnapshot.forEach((doc) => allContent.push({ id: doc.id, ...doc.data() }));

                loader.style.display = 'none';
                updateView();

                const urlParams = new URLSearchParams(window.location.search);
                const targetId = urlParams.get('id');
                if (targetId) {
                    const targetMovie = allContent.find(m => m.id === targetId);
                    if (targetMovie) openModal(targetMovie);
                }
            } catch (error) {
                console.error("Error:", error);
                loader.textContent = "Data could not be loaded.";
            }
        }

        
        function updateView() {
            let result = [...allContent];
            if (filterState.type !== 'all') result = result.filter(item => item.type === filterState.type);
            if (filterState.search.trim() !== '') result = result.filter(item => item.title.toLowerCase().includes(filterState.search.toLowerCase()));
            
            
            if (filterState.sort === 'newest') {
                result.sort((a, b) => (parseInt(a.year) || 0) - (parseInt(b.year) || 0)).reverse();
            } else if (filterState.sort === 'oldest') {
                result.sort((a, b) => (parseInt(a.year) || 9999) - (parseInt(b.year) || 9999));
            } else if (filterState.sort === 'az') {
                result.sort((a, b) => a.title.localeCompare(b.title, 'tr'));
            } else if (filterState.sort === 'za') {
                result.sort((a, b) => b.title.localeCompare(a.title, 'tr'));
            }

            renderGrid(result);
        }

        function renderGrid(data) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = "";
            if (data.length === 0) { grid.innerHTML = "<p>No results found.</p>"; return; }

            data.forEach(item => {
                const locCount = item.locations ? item.locations.length : 0;
                
                
                const ratingBadge = item.rating ? `<div class="rating-badge-card">★ ${item.rating}</div>` : '';
                const yearBadge = item.year ? `<span class="year-meta-card">${item.year}</span>` : '';

              
                const isFav = userFavorites.includes(item.id);
                const heartClass = isFav ? 'active' : '';

                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = (e) => {
                    
                    if(e.target.closest('.fav-btn')) return;
                    openModal(item);
                };
                
                card.innerHTML = `
                    <div class="poster-wrapper">
                        <img src="${item.poster}" alt="${item.title}" class="poster-img" onerror="this.src='https://placehold.co/400x600?text=No+Image'">
                        ${ratingBadge}
                        <div class="fav-btn ${heartClass}" onclick="toggleFav('${item.id}', this)" title="Add to Favorites">
                            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="card-header">
                            <h3 class="card-title">${item.title}</h3>
                            ${yearBadge}
                        </div>
                        <div class="card-meta">
                            <span>${item.type === 'movie' ? 'Movie' : 'Tv Show'}</span>
                            <span class="loc-badge">${locCount} Locations</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        
        window.toggleFav = async function(movieId, btnElement) {
            const user = auth.currentUser;
            if (!user) { alert("You must login to add to favorites."); return; }

            btnElement.classList.toggle('active');
            const result = await toggleFavorite(movieId);
            
            if (result.success) {
                if (result.action === 'added') userFavorites.push(movieId);
                else userFavorites = userFavorites.filter(id => id !== movieId);
            } else {
                btnElement.classList.toggle('active'); // Revert
                console.error(result.error);
            }
        };

        
        window.openModal = async function(item) {
            const modal = document.getElementById('detailModal');
            const routeBtn = document.getElementById('startRouteBtn');
            const spotifyBtn = document.getElementById('spotifyBtn');
            const mapDiv = document.getElementById('osm-map');
            
            mapDiv.style.display = 'none';
            routeBtn.textContent = "SHOW ROUTE ";
            routeBtn.style.display = 'none';

            document.getElementById('mPoster').src = item.poster;
            document.getElementById('mPosterBg').style.backgroundImage = `url('${item.poster}')`;

            document.getElementById('mTitle').textContent = item.title;
            document.getElementById('mDesc').textContent = item.description;
            document.getElementById('mType').textContent = item.type === 'movie' ? 'MOVIE' : 'TV SHOW';
            
            const yearEl = document.getElementById('mYear');
            const ratingBox = document.getElementById('mRatingBox');
            const ratingVal = document.getElementById('mRatingVal');

            
            if (item.year) {
                yearEl.textContent = item.year;
                yearEl.style.display = 'inline-block';
            } else {
                yearEl.style.display = 'none';
            }

            
            if (item.rating) {
                ratingVal.textContent = item.rating;
                ratingBox.style.display = 'flex';
            } else {
                ratingBox.style.display = 'none';
            }

            
            if (item.spotify && item.spotify.length > 5) {
                spotifyBtn.href = item.spotify;
                spotifyBtn.style.display = 'flex';
            } else { spotifyBtn.style.display = 'none'; }

    
            const locContainer = document.getElementById('mLocations');
            locContainer.innerHTML = "";

            const userRatings = await getUserRatingsForMovie(item.id);

            if(item.locations && item.locations.length > 0) {
                const sortedLocs = item.locations.sort((a, b) => (a.order || 0) - (b.order || 0));

                sortedLocs.forEach((loc, index) => {
                    const div = document.createElement('div');
                    div.className = 'location-item';
                    
        
                    const hasVideo = loc.scene && loc.scene.length > 5;
                    const playBtnHtml = hasVideo 
                        ? `<div class="play-icon-left" onclick="playSceneVideo('${loc.scene}')" title="Play Scene"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>`
                        : `<div class="play-icon-left disabled"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>`;

                    let html = `
                        <div class="loc-header">
                            ${playBtnHtml}
                            <div class="loc-number">${index + 1}</div>
                            <div style="flex:1; margin-left:15px;">
                                <strong style="color:white; display:block;">${loc.name}</strong>
                                <small style="color:#666;">${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)}</small>
                            </div>
                        </div>
                    `;

                    const currentRating = userRatings[index] || 0;
                    let starsHtml = '';
                    for(let i=1; i<=5; i++) {
                        const filled = i <= currentRating ? 'filled' : '';
                        starsHtml += `<span class="star ${filled}" data-val="${i}">★</span>`;
                    }

                    html += `
                        <div class="rating-container" id="rating-${index}">
                            <span class="rating-label">Your Rating:</span>
                            ${starsHtml}
                            <span class="user-only-msg">Login required!</span>
                        </div>
                    `;

                    div.innerHTML = html;
                    locContainer.appendChild(div);

                    const stars = div.querySelectorAll('.star');
                    stars.forEach(star => {
                        star.onclick = async function() {
                            if (!auth.currentUser) {
                                div.querySelector('.user-only-msg').style.display = 'inline';
                                setTimeout(() => div.querySelector('.user-only-msg').style.display = 'none', 2000);
                                return;
                            }
                            const val = parseInt(this.getAttribute('data-val'));
                            stars.forEach(s => {
                                const sVal = parseInt(s.getAttribute('data-val'));
                                if (sVal <= val) s.classList.add('filled');
                                else s.classList.remove('filled');
                            });
                            await saveUserRating(item.id, index, val);
                        };
                    });
                });

                routeBtn.style.display = 'block';
                
                // Google Maps Navigation
                routeBtn.onclick = function() {
                    let url = "";
                    if (sortedLocs.length === 1) {
                        url = `https://www.google.com/maps/search/?api=1&query=${sortedLocs[0].lat},${sortedLocs[0].lng}`;
                    } else {
                        const origin = `${sortedLocs[0].lat},${sortedLocs[0].lng}`;
                        const destination = `${sortedLocs[sortedLocs.length - 1].lat},${sortedLocs[sortedLocs.length - 1].lng}`;
                        let waypoints = "";
                        if (sortedLocs.length > 2) {
                            const waypointsArr = sortedLocs.slice(1, sortedLocs.length - 1).map(l => `${l.lat},${l.lng}`);
                            waypoints = `&waypoints=${waypointsArr.join('|')}`;
                        }
                        url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}${waypoints}&travelmode=driving`;
                    }
                    window.open(url, '_blank');
                };
                
                
                mapDiv.style.display = 'block';
                if (mapInstance) { mapInstance.remove(); mapInstance = null; }
                const startLat = sortedLocs[0].lat;
                const startLng = sortedLocs[0].lng;
                mapInstance = L.map('osm-map').setView([startLat, startLng], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(mapInstance);
                const latlngs = [];
                sortedLocs.forEach((loc, i) => {
                    const point = [loc.lat, loc.lng];
                    latlngs.push(point);
                    L.marker(point).addTo(mapInstance).bindPopup(`<b>${i + 1}. ${loc.name}</b><br>${item.title}`);
                });
                if (latlngs.length > 1) {
                    const polyline = L.polyline(latlngs, {color: '#e50914', weight: 4}).addTo(mapInstance);
                    mapInstance.fitBounds(polyline.getBounds());
                }

            } else {
                locContainer.innerHTML = "<p style='color:#666;'>No location information available yet.</p>";
            }
            modal.style.display = 'flex';
        }

        window.closeModal = function() {
            document.getElementById('detailModal').style.display = 'none';
            if (mapInstance) { mapInstance.remove(); mapInstance = null; }
        }

       
        window.playSceneVideo = function(url) {
            const modal = document.getElementById('sceneVideoModal');
            const player = document.getElementById('sceneVideoPlayer');
            player.src = url;
            modal.style.display = 'flex';
            setTimeout(() => { modal.classList.add('active'); player.play().catch(e => console.log("Auto play prevented")); }, 10);
        }

        window.closeSceneVideo = function() {
            const modal = document.getElementById('sceneVideoModal');
            const player = document.getElementById('sceneVideoPlayer');
            modal.classList.remove('active');
            player.pause();
            setTimeout(() => { modal.style.display = 'none'; player.src = ""; }, 300);
        }

        // Filters
        window.setFilter = function(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterState.type = type;
            updateView();
        }
        window.setSearch = function(val) { filterState.search = val; updateView(); }
        window.setSort = function(val) { filterState.sort = val; updateView(); }

        initAuthListener((user) => {
            fetchContent(); 
        });

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if(e.target === document.getElementById('detailModal')) closeModal();
        });
    </script>
</body>
</html>
